name: TestFlight

# Build TileCam and push it to TestFlight via fastlane.
# Trigger manually, or automatically on a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build + upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          # App Store Connect API key (Users and Access → Integrations)
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }} # base64 of the .p8
          ASC_KEY_CONTENT_BASE64: "true"
          # match — shared signing from the private certificates repo
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # PAT / deploy token with read access to the certificates repo
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
