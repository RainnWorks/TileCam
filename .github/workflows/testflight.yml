name: TestFlight

# Build TileCam and push it to TestFlight via fastlane.
# Trigger manually, or automatically on a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Pick the Xcode to build with. Two constraints:
      #  1. The app uses iOS 26 "Liquid Glass" APIs (glassEffect, the `.circle`
      #     shape shorthand) behind `#available(iOS 26, *)`, so it needs the
      #     iOS 26 SDK (Xcode 26+) to COMPILE — older Xcodes fail with
      #     "cannot infer contextual base in reference to member 'circle'".
      #  2. On the macos-15 image some Xcodes ship WITHOUT the iOS device
      #     platform, so `xcodebuild -destination generic/platform=iOS` (what
      #     gym archives with) fails with "iOS … is not installed".
      # So: scan every installed Xcode, newest first, and select the newest one
      # whose `-showsdks` actually lists an iphoneos SDK.
      - name: Select newest Xcode with iOS SDK
        run: |
          set -euo pipefail
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          selected=""
          for xc in $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -Vr); do
            dev="$xc/Contents/Developer"
            if DEVELOPER_DIR="$dev" xcodebuild -showsdks 2>/dev/null | grep -qi "iphoneos"; then
              selected="$xc"; break
            fi
          done
          if [ -z "$selected" ]; then
            echo "::error::No installed Xcode has the iOS device SDK"; exit 1
          fi
          echo "Selecting $selected"
          sudo xcode-select -s "$selected/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build + upload to TestFlight
        run: bundle exec fastlane ios beta
        env:
          # App Store Connect API key (Users and Access → Integrations)
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }} # base64 of the .p8
          ASC_KEY_CONTENT_BASE64: "true"
          # match — shared signing from the private certificates repo
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # PAT / deploy token with read access to the certificates repo
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
