name: GlassView
options:
  bundleIdPrefix: com.glassview
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    exactVersion: "140.0.0"

targets:
  GlassView:
    type: application
    platform: iOS
    sources:
      - GlassView
    settings:
      base:
        INFOPLIST_FILE: GlassView/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.glassview.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: true
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        TARGETED_DEVICE_FAMILY: "1,2,6"
        DEVELOPMENT_TEAM: YK42U4LDMG
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WebRTC
